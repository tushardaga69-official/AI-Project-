<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexStock AI - Forecast</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>

<div class="app-layout">
    
    {% include 'sidebar.html' %}

    <main class="main-content">
        <header class="page-header">
            <h1>AI Forecast Console</h1>
            <p>Input variables to generate a prediction via the ML model.</p>
        </header>
        
        <div class="card" style="max-width: 800px; padding: 2rem; margin: 0;">
            <div class="grid-form">
                
                <div class="input-group">
                    <label>Target Date</label>
                    <input type="date" id="date" class="input-field">
                </div>

                <div class="input-group">
                    <label>Store ID</label>
                    <input type="number" id="store_id" placeholder="Enter store ID" class="input-field">
                </div>

                <div class="input-group">
                    <label>SKU ID</label>
                    <input type="number" id="sku_id" placeholder="Enter item SKU" class="input-field">
                </div>

                <div class="input-group">
                    <label>Base Price ($)</label>
                    <input type="number" id="base_price" placeholder="e.g. 50.00" class="input-field">
                </div>

                <div class="input-group">
                    <label>Total Price ($)</label>
                    <input type="number" id="total_price" placeholder="e.g. 45.00" class="input-field">
                </div>

                <div class="input-group full-width" style="display: flex; gap: 2rem; margin-top: 0.5rem;">
                    <label class="checkbox-group">
                        <input type="checkbox" id="featured">
                        Featured Item
                    </label>
                    
                    <label class="checkbox-group">
                        <input type="checkbox" id="display">
                        Display Location
                    </label>
                </div>

                <div class="full-width" style="margin-top: 1rem;">
                    <button class="btn-primary" onclick="predict()" id="predict-btn">Generate Forecast</button>
                </div>
            </div>

            <div id="output-box" class="alert" style="margin-top: 1.5rem; display: none;">
                <h3 id="result"></h3>
                <p id="insight"></p>
            </div>
        </div>
    </main>

</div>

<script src="{{ url_for('static', filename='js/predict.js') }}"></script>
</body>
</html>
