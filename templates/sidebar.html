<aside class="sidebar">
    <div class="sidebar-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <defs>
                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#0ea5e9" />
                    <stop offset="100%" stop-color="#a855f7" />
                </linearGradient>
            </defs>
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line>
        </svg>
        <span>NexStock AI</span>
    </div>
    
    <div class="sidebar-scroll">
        <div class="sidebar-group-title">MAIN</div>
        <ul class="nav-links">
            <li>
                <a href="/dashboard" class="{% if request.path == '/dashboard' %}active{% endif %}">
                    <div class="nav-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> Dashboard</div>
                </a>
            </li>
            <li>
                <a href="/predict-page" class="{% if request.path == '/predict-page' %}active{% endif %}">
                    <div class="nav-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg> AI Forecast</div>
                </a>
            </li>
        </ul>

        <div class="sidebar-group-title">MONITORING</div>
        <ul class="nav-links">
            <li>
                <a href="/alerts" class="{% if request.path == '/alerts' %}active{% endif %}">
                    <div class="nav-flex">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg> 
                        Smart Alerts
                    </div>
                    {% if alert_count and alert_count > 0 %}
                    <span class="badge">{{ alert_count }}</span>
                    {% endif %}
                </a>
            </li>
            <li>
                <a href="/reports" class="{% if request.path == '/reports' %}active{% endif %}">
                    <div class="nav-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg> Reports</div>
                </a>
            </li>
        </ul>

        <div class="sidebar-group-title">ACCOUNT</div>
        <ul class="nav-links">
            <li>
                <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">
                    <div class="nav-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings</div>
                </a>
            </li>
            <li>
                <a href="/logout">
                    <div class="nav-flex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg> Logout</div>
                </a>
            </li>
        </ul>
    </div>

    <div class="sidebar-footer">
        <label class="theme-switch-wrapper" for="light-mode-toggle">
            Light Mode
            <div class="switch">
                <input type="checkbox" id="light-mode-toggle">
                <span class="slider"></span>
            </div>
        </label>
        
        <div class="user-profile">
            <div class="user-avatar">
                {{ session.get('user', 'O')[0] | upper }}
            </div>
            <div class="user-info">
                <span class="user-name">{{ session.get('user', 'Operator') }}</span>
                <span class="user-role">Administrator</span>
            </div>
        </div>
    </div>
</aside>
