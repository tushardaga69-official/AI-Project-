<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up - Inventory Demand Forecaster</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</head>
<body>

<!-- Theme Toggler -->
<button id="theme-toggle-btn" class="theme-toggle">🌙 Dark Mode</button>

<div class="auth-wrapper">
    <div class="card">
        <h2>Create an account</h2>
        <p class="subtitle">Join the Inventory Forecaster platform.</p>

        {% if error %}
        <div class="alert alert-error">
            <h3>Registration Error</h3>
            <p>{{ error }}</p>
        </div>
        {% endif %}
        
        <form method="POST" action="/signup">
            
            <div class="input-group">
                <label for="username">Username</label>
                <input class="input-field" type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input class="input-field" type="password" id="password" name="password" placeholder="••••••••" required 
                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*]).{8,}" 
                       title="Password must be at least 8 characters long, containing uppercase and lowercase letters, a number, and a special character (!@#$%^&*).">
                <span class="input-help">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char.</span>
            </div>

            <button class="btn-primary" type="submit">Sign Up</button>

        </form>

        <a href="/login" class="link-text">Already have an account? Log in</a>
    </div>
</div>

</body>
</html>
